[pipeline]
input = PennFudanPed/PNGImages/FudanPed00001.png
output = result_pennfudan.jpg

[detection]
win_stride_w = 4
win_stride_h = 4
padding_w = 16
padding_h = 16
scale = 1.03
score_threshold = 0.8
nms_threshold = 0.6
hit_threshold = 0.8
use_preprocessing = false
shrink_factor = 0.22

[masks]
grabcut_iters = 5

