[pipeline]
input = artifacts/images/smart_tune_best.jpg
output = result_image.jpg

[detection]
win_stride_w = 4
win_stride_h = 4
padding_w = 8
padding_h = 8
scale = 1.03
score_threshold = 0.0
nms_threshold = 0.65
hit_threshold = 0.0
use_preprocessing = true
shrink_factor = 0.0

[masks]
grabcut_iters = 8
morph_kernel_size = 5
morph_open_iters = 2
morph_close_iters = 2
