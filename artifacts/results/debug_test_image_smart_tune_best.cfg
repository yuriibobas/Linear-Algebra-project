[pipeline]
input = test_image.jpg
output = result_image.jpg

[detection]
win_stride_w = 4
win_stride_h = 4
padding_w = 8
padding_h = 8
scale = 1.08
score_threshold = 0.4
nms_threshold = 0.55
hit_threshold = 0.6
use_preprocessing = false
shrink_factor = 0.04

[masks]
grabcut_iters = 12
morph_kernel_size = 5
morph_open_iters = 2
morph_close_iters = 2
