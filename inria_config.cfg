[pipeline]
input = test_image.jpg
output = result_image.jpg

[detection]
win_stride_w = 4
win_stride_h = 4
padding_w = 16
padding_h = 16
scale = 1.15
score_threshold = 0.7
nms_threshold = 0.6
hit_threshold = 0.6000000000000001
use_preprocessing = false
shrink_factor = 0.24

[masks]
grabcut_iters = 12

