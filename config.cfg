[pipeline]
input = test_image.jpg
output = result_image.jpg

[detection]
win_stride_w = 8
win_stride_h = 8
padding_w = 8
padding_h = 8
scale = 1.02
score_threshold = 0.45
nms_threshold = 0.5
hit_threshold = 0.0
use_preprocessing = true
shrink_factor = 0.2

[masks]
grabcut_iters = 5
morph_kernel_size = 5
morph_open_iters = 2
morph_close_iters = 2

