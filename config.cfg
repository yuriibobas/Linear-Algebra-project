[pipeline]
input = test_image.jpg
output = result_image.jpg

[detection]
win_stride_w = 4
win_stride_h = 4
padding_w = 32
padding_h = 32
scale = 1.06
score_threshold = 0.15000000000000002
nms_threshold = 0.5
hit_threshold = 0.30000000000000004
use_preprocessing = false
shrink_factor = 0.08

[masks]
grabcut_iters = 5
morph_kernel_size = 5
morph_open_iters = 2
morph_close_iters = 2

